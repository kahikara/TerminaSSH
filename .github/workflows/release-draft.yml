name: release-draft-1-1-1

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-22.04
            args: --bundles deb,rpm,appimage
            rust_targets: ""
            no_strip: "true"

          - name: windows
            os: windows-latest
            args: --bundles nsis
            rust_targets: ""
            no_strip: ""

          - name: macos
            os: macos-latest
            args: --bundles dmg
            rust_targets: ""
            no_strip: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Build and upload draft release
        uses: tauri-apps/tauri-action@action-v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_STRIP: ${{ matrix.no_strip }}
        with:
          tagName: v1.1.1
          releaseName: Termina SSH v1.1.1
          releaseBody: |
            Draft release for 1.1.1.

            Highlights:
            Refined Linux title bar and editor window controls
            Tightened dashboard, settings, sidebar and terminal toolbar spacing
            Normalized terminal and editor paste behavior
            Unified context menu styling across the app, local browser and SFTP browser
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          assetNamePattern: "[name]_[version]_[arch][_setup][ext]"
